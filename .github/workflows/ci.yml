name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint:check

      - name: Run type check
        run: npm run typecheck

      - name: Run format check
        run: npm run format:check

      - name: Build application
        run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Run E2E tests
        run: npm run test:chrome
        continue-on-error: true
        env:
          APP_HOST_URL: ${{ secrets.APP_HOST_URL }}
          CONTENTSTACK_LOGIN: ${{ secrets.CONTENTSTACK_LOGIN }}
          CONTENTSTACK_PASSWORD: ${{ secrets.CONTENTSTACK_PASSWORD }}
          CONTENTSTACK_ORGANIZATION_UID: ${{ secrets.CONTENTSTACK_ORGANIZATION_UID }}
          STACK_API_KEY: ${{ secrets.STACK_API_KEY }}
          DEVELOPER_HUB_API: ${{ secrets.DEVELOPER_HUB_API }}
          BASE_API_URL: ${{ secrets.BASE_API_URL }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

